# This workflow will upload a Python Package to PyPI when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Build and Publish Tiferet Monday

on:
  push:
    tags:
      - 'v*a*'     # alpha pre-releases: v1.0.0a1, v1.0.0a2, etc.
      - 'v*b*'     # beta pre-releases: v1.0.0b1, v1.0.0b2, etc.
  release:
    types: [published]  # stable releases

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test]

      - name: Run tests
        run: |
          pytest --verbose

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools>=42 wheel

      - name: Extract version from tiferet_monday/__init__.py
        id: get_version
        run: |
          VERSION=$(python -c "from tiferet_monday import __version__; print(__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate version matches tag
        run: |
          TAG=${{ github.ref_name }}
          PACKAGE_VERSION=${{ steps.get_version.outputs.version }}
          if [ "$TAG" != "v$PACKAGE_VERSION" ]; then
            echo "Error: Tag ($TAG) does not match package version (v$PACKAGE_VERSION)"
            exit 1
          fi

      - name: Build package
        run: |
          python -m build

      - name: Check package
        run: |
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi

    permissions:
      id-token: write  # Required for OIDC authentication with PyPI

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
