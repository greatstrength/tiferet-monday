features:
  board.add_column:
    name: Add Column to Board
    description: Adds a new column to the specified board.
    commands:
    - attribute_id: board_add_column_cmd
      name: Add Column to Board
      description: Adds a new column to the specified board.
  board.query_columns:
    name: Query Columns in Board
    description: Retrieves columns in the specified board.
    commands:
    - attribute_id: board_query_columns_cmd
      name: Query Columns in Board
      description: Retrieves columns in the specified board.
  board.change_column_metadata:
    name: Change Column Metadata
    description: Changes the metadata of a column in the specified board.
    commands:
    - attribute_id: board_change_column_metadata_cmd
      name: Change Column Metadata
      description: Changes the metadata of a column in the specified board.
  board.delete_column:
    name: Delete Column from Board
    description: Deletes a specified column from the board.
    commands:
    - attribute_id: board_delete_column_cmd
      name: Delete Column from Board
      description: Deletes a specified column from the board.
  board.query_groups:
    name: Query Groups in Board
    description: Retrieves groups in the specified board.
    commands:
    - attribute_id: board_query_groups_cmd
      name: Query Groups in Board
      description: Retrieves groups in the specified board.
  board.query_items_page:
    name: Query Items Page in Board
    description: Retrieves a paginated list of items in the specified board.
    commands:
    - attribute_id: board_query_items_page_cmd
      name: Query Items Page in Board
      description: Retrieves a paginated list of items in the specified board.
  board.create_item:
    name: Create Item in Board
    description: Creates a new item in the specified board.
    commands:
    - attribute_id: board_create_item_cmd
      name: Create Item in Board
      description: Creates a new item in the specified board.
  doc.create_doc_in_column:
    name: Create Document in Column
    description: Creates a document in a specified column of the board.
    commands:
    - attribute_id: doc_create_in_column_cmd
      name: Create Document in Column
      description: Creates a document in a specified column of the board.
  doc.query_by_object_ids:
    name: Query Documents by Object IDs
    description: Retrieves documents by their object IDs.
    commands:
    - attribute_id: doc_query_by_object_ids_cmd
      name: Query Documents by Object IDs
      description: Retrieves documents by their object IDs.
  doc.update_doc_name:
    name: Update Document Name
    description: Updates the name of a document in a specified column.
    commands:
    - attribute_id: doc_update_name_cmd
      name: Update Document Name
      description: Updates the name of a document in a specified column.
  doc.query_doc_blocks:
    name: Read Document Blocks
    description: Reads blocks from a document.
    commands:
    - attribute_id: doc_query_doc_blocks_cmd
      name: Read Document Blocks
      description: Reads blocks from a document.
  doc.create_doc_block:
    name: Create Document Block
    description: Creates a new block in a document.
    commands:
    - attribute_id: doc_create_doc_block_cmd
      name: Create Document Block
      description: Creates a new block in a document.
  item.query_detail_by_id:
    name: Query Item Detail by ID
    description: Retrieves detailed information about an item by its ID.
    commands:
    - attribute_id: item_query_detail_by_id_cmd
      name: Query Item Detail by ID
      description: Retrieves detailed information about an item by its ID.
  item.query_by_ids:
    name: Query Items by IDs
    description: Retrieves items from monday.com by their IDs.
    commands:
    - attribute_id: item_query_by_ids_cmd
      name: Query Items by IDs
      description: Retrieves items from monday.com by their IDs.
  item.query_column_values:
    name: Query Item Column Values
    description: Retrieves column values for a specified item.
    commands:
    - attribute_id: item_query_column_values_cmd
      name: Query Item Column Values
      description: Retrieves column values for a specified item.
  item.query_subitems:
    name: Query Subitems
    description: Retrieves subitems for a specified parent item.
    commands:
    - attribute_id: item_query_subitems_cmd
      name: Query Subitems
      description: Retrieves subitems for a specified parent item.
  item.update_simple_column_value:
    name: Update Simple Column Value
    description: Updates the value of a simple column in an item.
    commands:
    - attribute_id: get_moncli_item_cmd
      name: Get Moncli Item
      description: Retrieves an item from Moncli by its ID.
      data_key: item
    - attribute_id: item_update_simple_column_value_cmd
      name: Update Simple Column Value
      description: Updates the value of a simple column in an item.
  item.create_subitem:
    name: Create Subitem
    description: Creates a subitem under a specified item.
    commands:
    - attribute_id: item_create_subitem_cmd
      name: Create Subitem
      description: Creates a subitem under a specified item.
